name = "eaa283-website"
compatibility_date = "2026-06-01"
pages_build_output_dir = "public"

# D1 database — create with:  npx wrangler d1 create eaa283-db
# then paste the database_id it prints below.
[[d1_databases]]
binding = "DB"
database_name = "eaa283-db"
database_id = "PASTE_YOUR_D1_DATABASE_ID_HERE"

# R2 bucket for uploaded documents — create with:  npx wrangler r2 bucket create eaa283-documents
[[r2_buckets]]
binding = "DOCS"
bucket_name = "eaa283-documents"
